name: Build Flet Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # NEW: Install Flutter manually so the CLI doesn't prompt for it
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x' # Matches the requirement for Flet 0.82.x
          channel: 'stable'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: |
          # Use the -y flag to automatically accept prompts
          flet build apk -y -v

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-release
          path: build/apk/*.apk
