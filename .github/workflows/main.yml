name: Build Flet Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Opt into Node.js 24 now to avoid the June 2nd forced switch issues
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Upgraded to v6 for Node 24 support
      - uses: actions/checkout@v6

      # Upgraded to v6 for Node 24 support
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip' # Optional: Speeds up subsequent builds

      - name: Install dependencies
        run: |
          pip install flet
          # If your excel_handler needs pandas or openpyxl, add them here:
          # pip install pandas openpyxl

      - name: Build APK
        run: |
          flet build apk --no-deps

      # Upgraded to v4 (current stable)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-release
          path: build/apk/*.apk
