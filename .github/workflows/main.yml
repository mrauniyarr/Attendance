name: Build Flet Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # This satisfies Flet's requirement for Flutter without asking [y/n]
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Flet 0.82.2 usually looks for the latest stable
          cache: true 

      - name: Install Flet and Dependencies
        run: |
          pip install flet
          # If excel_handler.py uses pandas/openpyxl, uncomment below:
          # pip install pandas openpyxl

      - name: Build APK
        run: |
          # We remove -y since it's unrecognized, and --no-deps is gone.
          # Just 'flet build apk' is enough now that Flutter is pre-installed.
          flet build apk -v

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-release
          path: build/apk/*.apk
