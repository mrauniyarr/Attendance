name: Build Flet Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Flet and App Dependencies
        run: |
          pip install flet
          # IMPORTANT: Flet needs to know what to bundle. 
          # If you don't have a requirements.txt, list them here:
          # pip install pandas openpyxl 

      - name: Build APK
        run: |
          # Removed --no-deps as it is deprecated in 0.82.x
          # Added -v for verbose output so you can see the progress
          flet build apk -v

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-release
          path: build/apk/*.apk
