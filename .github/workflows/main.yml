name: Build Flet Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet CLI
        run: pip install flet

      - name: Build APK
        run: |
          # This command packages your app
          flet build apk --no-deps

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-release
          path: build/apk/*.apk
